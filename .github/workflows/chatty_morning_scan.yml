name: Chatty Morning Scanner

on:
  schedule:
    - cron: '30 14 * * 1-5'
  workflow_dispatch:

jobs:
  run-chatty-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Chatty Scanner
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
        run: python chatty_scanner.py
