name: Budget Options Scanner

on:
  schedule:
    # 9:30 AM Eastern = 13:30 UTC
    - cron: '30 13 * * 1-5'
    # 2:00 PM Eastern = 18:00 UTC
    - cron: '0 18 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scanner
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
          NTFY_TOPIC:  ${{ secrets.NTFY_TOPIC }}
        run: python scanner.py
