name: Live Options Scanner

# On-demand: click "Run workflow" in the Actions tab whenever you want a
# scan right now. Uses Yahoo Finance intraday data (no API key needed).
on:
  workflow_dispatch:

jobs:
  live-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run live scanner
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python live_scanner.py
