name: Weekly Backtest Review

# Sunday 9:00 PM ET = Monday 01:00 UTC (during EDT summer)
# Reviews all signals from the past 7 days and scores hypothetical P&L.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'  # Same as wheel_scan; runs in parallel Sunday night

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # need full history so we can read signals.jsonl reliably
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backtest review
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          BACKTEST_LOOKBACK_DAYS: '7'
          BACKTEST_HORIZON_DAYS: '7'
        run: python backtest_review.py

      - name: Commit scored signals
        if: always()
        run: |
          if [ -f signals_scored.jsonl ] && ! git diff --quiet signals_scored.jsonl; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add signals_scored.jsonl
            git commit -m 'chore: append weekly backtest scores [skip ci]'
            git pull --rebase origin main || true
            git push
          fi
