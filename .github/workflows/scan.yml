name: Budget Options Scanner

on:
  schedule:
    # 6:00 PM Eastern = 22:00 UTC (weekdays only)
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scanner
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
          NTFY_TOPIC:  ${{ secrets.NTFY_TOPIC }}
        run: python scanner.py

      - name: Commit signal log
        if: always()
        run: |
          if [ -f signals.jsonl ] && ! git diff --quiet signals.jsonl; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add signals.jsonl
            git commit -m 'chore: append nightly scanner signals [skip ci]'
            # Retry once on push conflict
            git pull --rebase origin main || true
            git push
          fi
