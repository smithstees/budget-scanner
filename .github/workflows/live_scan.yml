name: Live Options Scanner

# Twice daily during market hours + on-demand.
# 10:15 AM ET and 2:15 PM ET on weekdays. Uses Yahoo Finance (no API key).
on:
  workflow_dispatch:
  schedule:
    - cron: '15 14 * * 1-5'  # 10:15 AM ET
    - cron: '15 18 * * 1-5'  # 2:15 PM ET

jobs:
  live-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run live scanner
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python live_scanner.py
