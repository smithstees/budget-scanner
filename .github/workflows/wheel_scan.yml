name: Wheel / CSP Scanner

# On-demand + weekly (Sunday night, so you have ideas Monday morning)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * 1'  # 1:00 UTC Monday = 9pm ET Sunday

permissions:
  contents: write

jobs:
  wheel-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run wheel scanner
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python wheel_scanner.py

      - name: Commit signal log
        if: always()
        run: |
          if [ -f signals.jsonl ] && ! git diff --quiet signals.jsonl; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add signals.jsonl
            git commit -m 'chore: append wheel scanner signals [skip ci]'
            git pull --rebase origin main || true
            git push
          fi
