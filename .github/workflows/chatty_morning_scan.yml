name: Chatty Morning Scanner

on:
  schedule:
    # 10:30 AM ET primary + 11:00 AM ET backup (GitHub cron can skip runs on free tier)
    - cron: '30 14 * * 1-5'
    - cron: '0 15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-chatty-scanner:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run Chatty Scanner
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
        run: python chatty_scanner.py

      - name: Commit signal log
        if: always()
        run: |
          if [ -f signals.jsonl ] && ! git diff --quiet signals.jsonl; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add signals.jsonl
            git commit -m 'chore: append chatty scanner signals [skip ci]'
            git pull --rebase origin main || true
            git push
          fi
